name: Qwen3-Omni CI

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: qwen3-omni-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: read

# DAG:
#   All 11 stages are dispatched in parallel.
#   stage-1-thinker
#   stage-2-tts
#   stage-3-mmmu
#   stage-4-mmmu-talker
#   stage-5-mmsu
#   stage-6-mmsu-talker
#   stage-7-videomme
#   stage-8-videomme-talker
#   stage-9-videoamme
#   stage-10-videoamme-talker
#   stage-11-thinker-tp2

jobs:
  stage-1-thinker:
    name: stage 1 - thinker length integration
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    uses: ./.github/workflows/_omni-priority-stage.yaml
    with:
      stage-name: stage 1 - thinker length integration
      job-timeout-minutes: "10"
      venv-name: omni-qwen3
      install-deps: "true"
      run-script: |
        source omni-qwen3/bin/activate
        export PYTHONPATH=$PWD
        export HF_ENDPOINT=https://hf-mirror.com
        export TORCHINDUCTOR_CACHE_DIR=/github/home/.torchinductor
        bash .github/scripts/run_flaky_pytest.sh \
          pytest tests/test_model/test_qwen3_omni_thinker_length.py -v -s -x
      post-stage-label: thinker-length

  stage-2-tts:
    name: stage 2 - TTS speed + WER + SIM
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
    uses: ./.github/workflows/_omni-priority-stage.yaml
    with:
      stage-name: stage 2 - TTS speed + WER + SIM
      job-timeout-minutes: "10"
      venv-name: omni-qwen3
      install-deps: "true"
      pre-run-script: |
        source omni-qwen3/bin/activate
        export HF_ENDPOINT=https://hf-mirror.com
        export SEEDTTS_SIM_CACHE_DIR=/github/home/seedtts-wavlm-sim
        python -m benchmarks.metrics.speaker_similarity_assets --warm-cache
      run-script: |
        source omni-qwen3/bin/activate
        export PYTHONPATH=$PWD
        export HF_ENDPOINT=https://hf-mirror.com
        export SEEDTTS_SIM_CACHE_DIR=/github/home/seedtts-wavlm-sim
        export TORCHINDUCTOR_CACHE_DIR=/github/home/.torchinductor
        bash .github/scripts/run_flaky_pytest.sh \
          pytest tests/test_model/test_qwen3_omni_tts_ci.py -v -s -x
      post-stage-label: TTS (speed + WER + SIM)
      artifact-path-globs: |
        */speed_results.json
        */wer_results.json
        */similarity_results.json
      artifact-upload-name: qwen3-omni-tts-results
      artifact-upload-path: /tmp/**/*_results.json

  stage-3-mmmu:
    name: stage 3 - MMMU accuracy + speed
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!github.event.pull_request.draft &&
       contains(github.event.pull_request.labels.*.name, 'run-ci'))
