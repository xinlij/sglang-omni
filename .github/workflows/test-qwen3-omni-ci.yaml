          pytest tests/test_model/test_qwen3_omni_mmmu_ci.py -v -s -x
      post-stage-label: MMMU (accuracy + speed)
      artifact-path-globs: |
        */mmmu/mmmu_results.json
      artifact-upload-name: qwen3-omni-mmmu-results
      artifact-upload-path: /tmp/**/mmmu_results.json

  stage-4-mmmu-talker:
